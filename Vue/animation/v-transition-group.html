<div id="app">
  <button v-on:click="add()">Add</button>
  <transition-group  name="card" tag="ul">
    <li class="card" v-for="item in items" :key="item.id">Id: {{ item.id }}</li>  
  </transition-group>
</div>

<script>
new Vue({
  el: "#app",
  methods: {
    add: function () {
      this.items.push({
        id: Math.random()
      })
    }
  },
  data: function () {
    return {
      items: [
        {
          id: 1
        },
        {
          id: 2
        }
      ]
    }
  }
})
</script>

<style>
.card {
  transition: all 0.5s;

}
.mega-item-enter-active, .mega-item-leave-active {
  transition: opacity 1s;
}
.mega-item-enter, .mega-item-leave-to /* .fade-leave-active below version 2.1.8 */ {
  opacity: 0;
}
.mega-item-move {
  transition: all 1s ease;
}
</style>
